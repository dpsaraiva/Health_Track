<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="images/health_icon.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title >Registro</title>
</head>
<body>
    <div class="row">
        <div class="col-2">
          <img id="logo" src="images/health_icon2.png" alt="icone">
        </div>
        <div class="col-10">
            <div class="container">
                <div class="row">
                <div class="col-sm-9 col-md-7 col-lg-5 mx-auto">
                        <div class="card card-signin my-5">
                            <div class="card-body">
                                    <h5 class="text-center">Registro</h5>
                                    <form>
                                        <div>
                                            <input type="text" id="inputUserame" class="form-control" placeholder="Nome" required autofocus>
                                            <label for="inputUserame">Nome</label>
                                        </div>

                                        <div>
                                            <input type="email" id="inputEmail" class="form-control" placeholder="Endereço email" required>
                                            <label for="inputEmail">Email</label>
                                        </div>
                                        
                                        <hr>

                                        <div>
                                            <input type="password" id="inputPassword" class="form-control" placeholder="Senha" required>
                                            <label for="inputPassword">Senha</label>
                                        </div>
                                        
                                        <div>
                                            <input type="password" id="inputConfirmPassword" class="form-control" placeholder="Confirmar senha" required>
                                            <label for="inputConfirmPassword">Confirmar Senha</label>
                                        </div>

                                        <button class="btn btn-sm btn-primary btn-block">Registrar</button>
                                        
                                        <a href="dashboard.html"><button class="btn btn-primary d-grid gap-2 col-6 mx-auto" type="button">Entrar</button></a>

                                        <hr class="my-4">

                                        <a id="icone-google" href="dashboard.html" class="btn btn-primary btn-sm" tabindex="-1" role="button">Entrar com Google</a>

                                        <a href="dashboard.html" class="btn btn-primary btn-sm" tabindex="-1" role="button">Entrar com Facebook</a>
                                    </form>
                            </div>
                        </div>
                </div>
                </div>
            </div>
        </div>
    </div>       
  </body>
  
</html>
